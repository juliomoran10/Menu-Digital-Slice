<div class="financiero">
  <h2 class="financiero__title">Finanzas</h2>

  <div class="financiero__resumen">
    <div class="financiero__metrica">
      <span class="financiero__metrica-label">Total Ventas</span>
      <span class="financiero__metrica-value financiero__total-ventas">$0.00</span>
    </div>
    <div class="financiero__metrica">
      <span class="financiero__metrica-label">Pedidos</span>
      <span class="financiero__metrica-value financiero__total-pedidos">0</span>
    </div>
  </div>

  <section class="financiero__section">
    <h3 class="financiero__section-title">Tipos de Cambio</h3>
    <table class="financiero__tabla">
      <thead>
        <tr><th>Moneda</th><th>Tasa</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <section class="financiero__section">
    <h3 class="financiero__section-title">Productos Más Pedidos</h3>
    <div class="financiero__chart"></div>
  </section>

  <section class="financiero__section">
    <h3 class="financiero__section-title">Compras Recientes</h3>
    <div class="financiero__orders"></div>
  </section>
</div>
